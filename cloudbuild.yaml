steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/agent-workspace-api:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/agent-workspace-api:latest', '.']

  # Step 2: Push the image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agent-workspace-api:$SHORT_SHA']

  # Step 3: Push the latest image tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agent-workspace-api:latest']

  # Step 4: Get GKE credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'agent-workspace-cluster'
      - '--region=us-central1'
      - '--project=$PROJECT_ID'

  # Step 5: Set env vars on the deployment (secrets injected via secretEnv)
  - name: 'gcr.io/cloud-builders/kubectl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        kubectl set env deployment/agent-workspace-api \
          -n agent-sandbox-application \
          CLOUD_SQL_CONNECTION_NAME=funky-485504:us-central1:funky-landing \
          DB_USER=postgres \
          DB_NAME=workspace_api \
          "DB_PASS=$$DB_PASS" \
          "JWT_SECRET=$$JWT_SECRET" \
          GOOGLE_CLIENT_ID=819221826816-5v3r7pgtj96l56cs3770vesaa79r9rk5.apps.googleusercontent.com
    secretEnv: ['DB_PASS', 'JWT_SECRET']

  # Step 6: Restart deployment to pick up :latest image + new env vars
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'rollout'
      - 'restart'
      - 'deployment/agent-workspace-api'
      - '-n'
      - 'agent-sandbox-application'

  # Step 7: Check deployment status
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'rollout'
      - 'status'
      - 'deployment/agent-workspace-api'
      - '-n'
      - 'agent-sandbox-application'
      - '--timeout=300s'

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: "projects/819221826816/secrets/db_password/versions/latest"
      env: "DB_PASS"
    - versionName: "projects/819221826816/secrets/jwt_secret/versions/latest"
      env: "JWT_SECRET"

images:
  - 'gcr.io/$PROJECT_ID/agent-workspace-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/agent-workspace-api:latest'
